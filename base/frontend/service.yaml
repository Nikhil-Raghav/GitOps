apiVersion: v1
kind: Service
metadata:
  name: frontend
  labels:
    app: frontend
spec:
  # ClusterIP only — external traffic is handled by the Gateway API.
  # The frontend-external LoadBalancer service has been removed;
  # use overlays/microk8s or overlays/eks to deploy the GatewayClass.
  type: ClusterIP
  selector:
    app: frontend
  ports:
  - name: http
    port: 80
    targetPort: 8080
