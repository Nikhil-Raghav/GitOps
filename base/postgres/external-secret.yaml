# -------------------------------------------------------
# ExternalSecret — postgres-secret
#
# ESO reads itkannadigaru/postgres from AWS Secrets Manager
# and materialises it as a standard Kubernetes Secret named
# "postgres-secret" in the same namespace.
#
# The postgres Deployment and authservice Deployment both
# reference this Secret via secretKeyRef.
# -------------------------------------------------------
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: postgres-secret
  namespace: default
spec:
  # How often ESO re-syncs from Secrets Manager
  refreshInterval: 1h

  secretStoreRef:
    name: aws-secrets-manager
    kind: SecretStore

  target:
    name: postgres-secret          # name of the k8s Secret to create
    creationPolicy: Owner          # ESO owns the Secret; deletes it when ExternalSecret is deleted
    deletionPolicy: Retain         # keep the Secret if ExternalSecret is removed (safety net)
    template:
      type: Opaque

  # Map individual JSON properties from the Secrets Manager secret
  # to keys inside the k8s Secret.
  data:
    - secretKey: password
      remoteRef:
        key: itkannadigaru/postgres
        property: password

    - secretKey: username
      remoteRef:
        key: itkannadigaru/postgres
        property: username

    - secretKey: dbname
      remoteRef:
        key: itkannadigaru/postgres
        property: dbname

    - secretKey: host
      remoteRef:
        key: itkannadigaru/postgres
        property: host

    - secretKey: port
      remoteRef:
        key: itkannadigaru/postgres
        property: port
