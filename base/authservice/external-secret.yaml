# -------------------------------------------------------
# ExternalSecret — authservice-secret
#
# ESO reads itkannadigaru/authservice from AWS Secrets Manager
# and materialises it as a k8s Secret named "authservice-secret".
# Also pulls the DB password from the postgres secret so
# authservice only needs a single Secret reference.
# -------------------------------------------------------
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: authservice-secret
  namespace: default
spec:
  refreshInterval: 1h

  secretStoreRef:
    name: aws-secrets-manager
    kind: SecretStore

  target:
    name: authservice-secret
    creationPolicy: Owner
    deletionPolicy: Retain
    template:
      type: Opaque

  data:
    # JWT signing key
    - secretKey: jwt-secret
      remoteRef:
        key: itkannadigaru/authservice
        property: jwt-secret

    # DB connection details pulled from postgres secret
    - secretKey: db-password
      remoteRef:
        key: itkannadigaru/postgres
        property: password

    - secretKey: db-username
      remoteRef:
        key: itkannadigaru/postgres
        property: username

    - secretKey: db-name
      remoteRef:
        key: itkannadigaru/postgres
        property: dbname
