# -------------------------------------------------------
# ServiceAccount used by External Secrets Operator
# to authenticate with AWS Secrets Manager via IRSA.
#
# The eks.amazonaws.com/role-arn annotation is patched
# per-overlay (overlays/eks/kustomization.yaml) with the
# actual IAM role ARN from Terraform output.
# -------------------------------------------------------
apiVersion: v1
kind: ServiceAccount
metadata:
  name: external-secrets-sa
  namespace: default
  # Annotation added via overlay patch:
  # annotations:
  #   eks.amazonaws.com/role-arn: <IRSA_ROLE_ARN>
