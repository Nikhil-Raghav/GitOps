# -------------------------------------------------------
# SecretStore — connects External Secrets Operator to
# AWS Secrets Manager in us-west-2.
#
# Authentication: IRSA via external-secrets-sa ServiceAccount.
# The pod token projected by EKS is exchanged for temporary
# AWS credentials using sts:AssumeRoleWithWebIdentity.
# -------------------------------------------------------
apiVersion: external-secrets.io/v1beta1
kind: SecretStore
metadata:
  name: aws-secrets-manager
  namespace: default
spec:
  provider:
    aws:
      service: SecretsManager
      region: us-west-2
      auth:
        jwt:
          # ESO fetches a projected ServiceAccount token and uses it
          # to call sts:AssumeRoleWithWebIdentity.
          # The role ARN comes from the ServiceAccount annotation.
          serviceAccountRef:
            name: external-secrets-sa
