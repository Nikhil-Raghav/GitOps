# -------------------------------------------------------
# EKS TLS Secret via AWS ACM (external-secrets or manual)
#
# Option A — Use AWS Certificate Manager via load balancer
#   annotation (no Secret needed, handled at NLB level):
#   See service.beta.kubernetes.io/aws-load-balancer-ssl-cert
#   in overlays/eks/gatewayclass.yaml EnvoyProxy.
#
# Option B — Use cert-manager with Route53 DNS-01 challenge:
# -------------------------------------------------------
# apiVersion: cert-manager.io/v1
# kind: Certificate
# metadata:
#   name: online-boutique-tls
#   namespace: default
# spec:
#   secretName: online-boutique-tls
#   issuerRef:
#     name: letsencrypt-prod
#     kind: ClusterIssuer
#   dnsNames:
#     - shop.example.com
#
# -------------------------------------------------------
# Gateway patch for EKS — override HTTPS cert reference
# to use ACM ARN annotation instead of a Secret.
# If using ACM at the NLB level, you can remove the HTTPS
# listener from the Gateway entirely and terminate TLS at
# the load balancer.
# -------------------------------------------------------
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: online-boutique-gateway
  namespace: default
  annotations:
    # EKS: Instruct Envoy Gateway to provision an NLB
    # Additional NLB settings are in EnvoyProxy (gatewayclass.yaml)
spec:
  gatewayClassName: online-boutique-gw-class
  listeners:
    - name: http
      protocol: HTTP
      port: 80
      allowedRoutes:
        namespaces:
          from: Same
    - name: https
      protocol: HTTPS
      port: 443
      tls:
        mode: Terminate
        certificateRefs:
          - name: online-boutique-tls
            kind: Secret
      allowedRoutes:
        namespaces:
          from: Same
