apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# -------------------------------------------------------
# Overlay for AWS EKS
# Uncomment sections below when deploying to EKS
# -------------------------------------------------------

resources:
  - ../../base
  - gatewayclass.yaml

# namespace: itkannadigaru          # Uncomment: target namespace on EKS

# Common labels applied to all resources
labels:
  - pairs:
      environment: eks

# Image overrides — update tag here when a new image is pushed
images:
  - name: manojkrishnappa/adservice
    newTag: "1"
  - name: manojkrishnappa/cartservice
    newTag: "1"
  - name: manojkrishnappa/checkoutservice
    newTag: "1"
  - name: manojkrishnappa/currencyservice
    newTag: "1"
  - name: manojkrishnappa/emailservice
    newTag: "1"
  - name: manojkrishnappa/frontend
    newTag: "1"
  - name: manojkrishnappa/loadgenerator
    newTag: "1"
  - name: manojkrishnappa/paymentservice
    newTag: "1"
  - name: manojkrishnappa/productcatalogservice
    newTag: "1"
  - name: manojkrishnappa/recommendationservice
    newTag: "1"
  - name: manojkrishnappa/shippingservice
    newTag: "1"
  - name: manojkrishnappa/shoppingassistantservice
    newTag: "1"

# -------------------------------------------------------
# EKS-specific patches — Uncomment when deploying to EKS
# -------------------------------------------------------

patches: []
  # -------------------------------------------------------
  # IRSA annotation for external-secrets-sa ServiceAccount
  # Replace ROLE_ARN with the value from Terraform output:
  #   cd InfraStructure/3-irsa && terraform output external_secrets_role_arn
  # The eks-irsa-setup.sh script patches this automatically.
  # -------------------------------------------------------
  # - patch: |-
  #     apiVersion: v1
  #     kind: ServiceAccount
  #     metadata:
  #       name: external-secrets-sa
  #       namespace: default
  #       annotations:
  #         eks.amazonaws.com/role-arn: ROLE_ARN

  # Scale up replicas for production on EKS
  # - patch: |-
  #     apiVersion: apps/v1
  #     kind: Deployment
  #     metadata:
  #       name: frontend
  #     spec:
  #       replicas: 2

  # - patch: |-
  #     apiVersion: apps/v1
  #     kind: Deployment
  #     metadata:
  #       name: checkoutservice
  #     spec:
  #       replicas: 2

  # - patch: |-
  #     apiVersion: apps/v1
  #     kind: Deployment
  #     metadata:
  #       name: productcatalogservice
  #     spec:
  #       replicas: 2

  # - patch: |-
  #     apiVersion: apps/v1
  #     kind: Deployment
  #     metadata:
  #       name: recommendationservice
  #     spec:
  #       replicas: 2

  # -------------------------------------------------------
  # NOTE: frontend-external LoadBalancer has been removed.
  # External access is now managed by Gateway API.
  # NLB annotations are configured in gatewayclass.yaml
  # via the EnvoyProxy.spec.provider.kubernetes.envoyService.annotations.
  # -------------------------------------------------------

