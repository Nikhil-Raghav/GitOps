# -------------------------------------------------------
# cert-manager Certificate for MicroK8s TLS
#
# Prerequisites:
#   microk8s enable cert-manager
#   # or: kubectl apply -f https://github.com/cert-manager/cert-manager/releases/latest/download/cert-manager.yaml
#
# For dev/test, uses a self-signed ClusterIssuer.
# For production, swap issuerRef to a Let's Encrypt issuer.
# -------------------------------------------------------
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: selfsigned-issuer
spec:
  selfSigned: {}

---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: online-boutique-tls
  namespace: default
spec:
  secretName: online-boutique-tls
  issuerRef:
    name: selfsigned-issuer
    kind: ClusterIssuer
  dnsNames:
    - localhost
    # Add your actual domain when available:
    # - shop.example.com
