apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# -------------------------------------------------------
# Overlay for MicroK8s + ArgoCD
# -------------------------------------------------------

resources:
  - ../../base

namespace: default

# Common labels applied to all resources
labels:
  - pairs:
      environment: microk8s

# Image overrides — update tag here when a new image is pushed
images:
  - name: nikhilraghav08/adservice
    newTag: "1"
  - name: nikhilraghav08/cartservice
    newTag: "1"
  - name: nikhilraghav08/checkoutservice
    newTag: "1"
  - name: nikhilraghav08/currencyservice
    newTag: "1"
  - name: nikhilraghav08/emailservice
    newTag: "1"
  - name: nikhilraghav08/frontend
    newTag: "1"
  - name: nikhilraghav08/loadgenerator
    newTag: "1"
  - name: nikhilraghav08/paymentservice
    newTag: "1"
  - name: nikhilraghav08/productcatalogservice
    newTag: "1"
  - name: nikhilraghav08/recommendationservice
    newTag: "1"
  - name: nikhilraghav08/shippingservice
    newTag: "1"
  - name: nikhilraghav08/shoppingassistantservice
    newTag: "1"

# Replica count suitable for a single-node MicroK8s cluster
patches:
  - patch: |-
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: adservice
      spec:
        replicas: 1
  - patch: |-
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: cartservice
      spec:
        replicas: 1
  - patch: |-
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: checkoutservice
      spec:
        replicas: 1
  - patch: |-
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: currencyservice
      spec:
        replicas: 1
  - patch: |-
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: emailservice
      spec:
        replicas: 1
  - patch: |-
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: frontend
      spec:
        replicas: 1
  - patch: |-
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: paymentservice
      spec:
        replicas: 1
  - patch: |-
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: productcatalogservice
      spec:
        replicas: 1
  - patch: |-
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: recommendationservice
      spec:
        replicas: 1
  - patch: |-
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: shippingservice
      spec:
        replicas: 1
  - patch: |-
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: shoppingassistantservice
      spec:
        replicas: 1
